<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore QR MoveLandS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:30px;
}

h1{
    color:#2c3e50;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.qr{
    margin-top:15px;
}
</style>
</head>

<body>

<h1>Generazione QR dei mezzi</h1>

<div id="listaMezzi"></div>

<script>

async function caricaMezzi(){

    const response = await fetch("/api/mezzi");
    const mezzi = await response.json();

    const contenitore =
        document.getElementById("listaMezzi");

    contenitore.innerHTML = "";

    mezzi.forEach(mezzo => {

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <h3>${mezzo.tipo} ${mezzo.modello}</h3>

            <p><b>ID:</b> ${mezzo.id_mezzo}</p>

            <p><b>Stato:</b> ${mezzo.stato}</p>

            <button onclick="generaQR(
                '${mezzo.codice_qr}',
                'qr-${mezzo.id_mezzo}'
            )">
                Genera QR
            </button>

            <div
                id="qr-${mezzo.id_mezzo}"
                class="qr">
            </div>
        `;

        contenitore.appendChild(card);

    });

}

function generaQR(codice,idDiv){

    const div =
        document.getElementById(idDiv);

    div.innerHTML = "";

    new QRCode(div,{
        text: codice,
        width: 200,
        height: 200
    });

}

caricaMezzi();

</script>

</body>
</html>
